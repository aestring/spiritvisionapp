<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Song Ranker</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: #0b111e;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .phone-container {
            width: 100%;
            max-width: 450px;
            background: linear-gradient(180deg, #050b14 0%, #0d1b2a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            padding-bottom: 90px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: rgba(5, 11, 20, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header .menu-icon, .header .profile-icon {
            font-size: 20px;
            cursor: pointer;
            opacity: 0.8;
        }

        .header .title {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .header .title span {
            color: #a4b3d6;
        }

        .user-banner {
            background: linear-gradient(90deg, #162235 0%, #000000 100%);
            padding: 18px 20px;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #000;
        }

        .song-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .song-item {
            display: flex;
            align-items: center;
            background: linear-gradient(90deg, #172a45 0%, #112233 100%);
            margin-bottom: 2px;
            height: 85px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            touch-action: none;
        }

        .song-item.dragging {
            opacity: 0.5;
            background: #1e3b60;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .drag-handle {
            width: 45px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            cursor: grab;
            height: 100%;
            opacity: 0.4;
        }

        .drag-handle span {
            display: block;
            width: 18px;
            height: 2px;
            background-color: #fff;
        }

        .flag-box {
            width: 55px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
        }

        .info-box {
            flex-grow: 1;
            padding-left: 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .country-name {
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            color: #d1dc28;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .artist-name {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
        }

        .song-title {
            font-size: 12px;
            color: #8fa0c0;
            margin-top: 1px;
        }

        .rank-badge {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 75px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* play button styling (replaces previous mock) */
        .play-btn {
            width: 36px;
            height: 36px;
            border: 2px solid #fff;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            color: #fff;
            background: rgba(255,255,255,0.02);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }

        .play-btn.playing {
            background: linear-gradient(180deg, #2b7be6 0%, #1a4f9a 100%);
            border-color: #9fc4ff;
        }

        .footer-action {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 450px;
            background-color: rgba(5, 11, 20, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        .save-btn {
            background: linear-gradient(180deg, #1f4277 0%, #10284e 100%);
            color: white;
            border: 2px solid #325f9d;
            border-radius: 8px;
            padding: 12px 0;
            width: 80%;
            font-weight: bold;
            font-size: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        .save-btn:active {
            transform: scale(0.98);
            background: #10284e;
        }
    </style>
</head>
<body>

<div class="phone-container">
    
    <header class="header">
        <div class="menu-icon">☰</div>
        <div class="title">SpiritVision <span></span></div>
        <div class="profile-icon">👤</div>
    </header>

    <div class="user-banner">
        VOTE HERE
    </div>

    <ul class="song-list" id="draggable-list">
        </ul>

    <div class="footer-action">
        <button class="save-btn" onclick="saveTopRanks()">Save My Top</button>
    </div>
</div>

<script>
    // Add an 'audio' field for each item. Place the actual audio files in an 'audio' folder
    // next to this HTML file (example paths below). Adjust filenames to match your files.
    const initialSongs = [
        { id: 1, country: "Madagascar", flag: "🇲🇬", artist: "Adele", song: "Skyfall", audio: "audio/madagascar.mp3" },
        { id: 2, country: "Sweden", flag: "🇸🇪", artist: "Cupcake", song: "TITTO (Loreen's cover)", audio: "audio/sweden.mp3" },
        { id: 3, country: "Australia", flag: "🇦🇺", artist: "Delta Goodrem", song: "Eclipse", audio: "audio/australia.mp3" },
        { id: 4, country: "Latvia", flag: "🇱🇻", artist: "Atvara", song: "Ena", audio: "audio/latvia.mp3" },
        { id: 5, country: "Cyprus", flag: "🇨🇾", artist: "Ava Max", song: "My head & My Heart", audio: "audio/cyprus.mp3" },
        { id: 6, country: "Romania", flag: "🇷🇴", artist: "Mona", song: "Сила", audio: "audio/romania.mp3" },
        { id: 7, country: "Azerbaijan", flag: "🇦🇿", artist: "Jessie Reyez & Elyana", song: "Illuminate", audio: "audio/azerbaijan.mp3" },
        { id: 8, country: "Armenia", flag: "🇦🇲", artist: "Sirusho", song: "Huh-hah", audio: "audio/armenia.mp3" },
        { id: 9, country: "Slovakia", flag: "🇸🇰", artist: "Lana Del Rey", song: "Cinnamon Girl", audio: "audio/slovakia.mp3" },
        { id: 10, country: "Germany", flag: "🇩🇪", artist: "DARA", song: "Thunder", audio: "audio/germany.mp3" }
    ];

    const listContainer = document.getElementById('draggable-list');

    // Keep references to audio elements so we can stop others when one plays
    const audioElements = new Map();

    function initList() {
        initialSongs.forEach((item) => {
            const li = document.createElement('li');
            li.classList.add('song-item');
            li.setAttribute('draggable', 'true');
            li.dataset.id = item.id;

            li.innerHTML = `
                <div class="drag-handle">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <div class="flag-box">${item.flag}</div>
                <div class="info-box">
                    <span class="country-name">${item.country}</span>
                    <span class="artist-name">${item.artist}</span>
                    <span class="song-title">${item.song}</span>
                </div>
                <div class="rank-badge">
                    <button class="play-btn" aria-label="Play ${item.country}">▶</button>
                </div>
            `;

            // create and attach a hidden audio element for this item
            const audioEl = document.createElement('audio');
            audioEl.src = item.audio;
            audioEl.preload = 'metadata';
            audioEl.dataset.ownerId = item.id;
            audioEl.style.display = 'none';
            li.appendChild(audioEl);
            audioElements.set(String(item.id), audioEl);

            // Setup Event Handlers for both mouse and touch systems
            addDragListeners(li);

            // Play button logic
            const playBtn = li.querySelector('.play-btn');

            // Prevent drag when interacting with the play button
            playBtn.addEventListener('mousedown', (ev) => ev.stopPropagation());
            playBtn.addEventListener('touchstart', (ev) => ev.stopPropagation(), { passive: true });

            playBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                const audio = audioElements.get(String(item.id));
                if (!audio) return;

                // If playing, pause. Otherwise, pause all others and play this one.
                if (!audio.paused) {
                    audio.pause();
                    playBtn.classList.remove('playing');
                    playBtn.textContent = '▶';
                } else {
                    stopAllAudio();
                    audio.play().catch(() => {
                        // play could fail silently if file missing or browser policy; signal by alert or console
                        console.warn('Playback failed for', audio.src);
                    });
                    // update UI
                    playBtn.classList.add('playing');
                    playBtn.textContent = '❚❚';
                }
            });

            // when audio ends, reset button visuals
            audioEl.addEventListener('ended', () => {
                playBtn.classList.remove('playing');
                playBtn.textContent = '▶';
            });

            // If playback is paused by other means, ensure button reflects state
            audioEl.addEventListener('pause', () => {
                playBtn.classList.remove('playing');
                playBtn.textContent = '▶';
            });

            audioEl.addEventListener('play', () => {
                playBtn.classList.add('playing');
                playBtn.textContent = '❚❚';
            });

            listContainer.appendChild(li);
        });
    }

    function stopAllAudio() {
        audioElements.forEach((audio) => {
            if (!audio.paused) {
                audio.pause();
                audio.currentTime = 0;
            }
        });
        // also reset all play buttons visuals
        document.querySelectorAll('.play-btn').forEach(btn => {
            btn.classList.remove('playing');
            btn.textContent = '▶';
        });
    }

    // Drag and Drop Logic Structure
    function addDragListeners(item) {
        // Desktop support
        item.addEventListener('dragstart', () => item.classList.add('dragging'));
        item.addEventListener('dragend', () => item.classList.remove('dragging'));

        // Mobile touch devices support
        item.addEventListener('touchstart', (e) => {
            item.classList.add('dragging');
        }, { passive: true });

        item.addEventListener('touchend', () => {
            item.classList.remove('dragging');
        });

        item.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const afterElement = getDragAfterElement(listContainer, touch.clientY);
            const dragging = document.querySelector('.dragging');
            if (dragging) {
                if (afterElement == null) {
                    listContainer.appendChild(dragging);
                } else {
                    listContainer.insertBefore(dragging, afterElement);
                }
            }
        }, { passive: false });
    }

    listContainer.addEventListener('dragover', (e) => {
        e.preventDefault();
        const afterElement = getDragAfterElement(listContainer, e.clientY);
        const dragging = document.querySelector('.dragging');
        if (afterElement == null) {
            listContainer.appendChild(dragging);
        } else {
            listContainer.insertBefore(dragging, afterElement);
        }
    });

    function getDragAfterElement(container, y) {
        const draggableElements = [...container.querySelectorAll('.song-item:not(.dragging)')];

        return draggableElements.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) {
                return { offset: offset, element: child };
            } else {
                return closest;
            }
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function saveTopRanks() {
        const items = [...listContainer.querySelectorAll('.song-item')];
        const currentRanking = items.map((item, index) => {
            const country = item.querySelector('.country-name').innerText;
            return `${index + 1}. ${country}`;
        });

        // Create a text file and trigger download instead of showing an alert
        const content = currentRanking.join("\n");
        const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
        const filename = `spiritvision_top_${new Date().toISOString().slice(0,19).replace(/[:T]/g, "-")}.txt`;
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);

        console.log("Saved Order:", currentRanking);
    }

    // Clean up audio on page unload
    window.addEventListener('beforeunload', () => {
        stopAllAudio();
    });

    // Boot execution 
    initList();
</script>

</body>
</html>
